<!DOCTYPE html>
<html>
<head>
    <title>RH Inteligente</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .success {
            color: green;
            margin-top: 20px;
        }

        .dashboard-link {
            margin-top: 30px;
            display: block;
            font-size: 14px;
            color: #555;
        }

        .dashboard-link button {
            background-color: #333;
        }

        /* 🔥 BOTÃO DO RECRUTADOR */
        .admin-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
        }

        .admin-button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<!-- 🔥 BOTÃO DISCRETO DO RECRUTADOR -->
<a href="/dashboard" class="admin-button">
    ⚙️ Painel do Recrutador
</a>

<div class="container">

    <h2>Envie seu currículo</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="curriculo" required><br>
        <button type="submit">Enviar</button>
    </form>

    {% if enviado %}
        <p class="success">Currículo enviado com sucesso! ✅</p>

        <a href="/dashboard" class="dashboard-link">
            <button>Ver análise</button>
        </a>
    {% endif %}

</div>

</body>
</html>
