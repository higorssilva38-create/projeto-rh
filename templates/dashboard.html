<!DOCTYPE html>
<html>
<head>
    <title>Dashboard RH Inteligente</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        h2 {
            margin-top: 20px;
        }

        .param-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            padding: 8px;
            width: 60%;
            margin-bottom: 10px;
        }

        table {
            margin: auto;
            background: white;
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .secondary {
            background-color: #333;
        }

        .secondary:hover {
            background-color: #555;
        }

        /* 🔥 BOTÃO VOLTAR */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<!-- 🔥 BOTÃO PARA VOLTAR -->
<a href="/" class="back-button">⬅ Voltar para envio</a>

<div class="container">

    <h2>Dashboard de Recrutamento</h2>

    <!-- 🔥 PARÂMETROS -->
    <div class="param-box">
        <h3>Definir parâmetros da vaga</h3>

        <form method="POST" action="/set_parametros">
            <input type="text" name="parametros" placeholder="Ex: python, comunicação, liderança">
            <br>
            <button type="submit">Salvar parâmetros</button>
        </form>

        <form method="POST" action="/reset_parametros">
            <button type="submit" class="secondary">Limpar parâmetros</button>
        </form>

        <p><strong>Parâmetros atuais:</strong> {{ parametros }}</p>
    </div>

    <!-- 🔥 RANKING -->
    <h3>Ranking de Candidatos</h3>

    <table>
        <tr>
            <th>Posição</th>
            <th>Nome</th>
            <th>Nota</th>
            <th>Parecer</th>
        </tr>

        {% for candidato in ranking %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ candidato.nome }}</td>
            <td>{{ candidato.nota }}</td>
            <td>{{ candidato.parecer }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <form method="POST" action="/limpar">
        <button type="submit" class="secondary">Limpar candidatos</button>
    </form>

</div>

</body>
</html>
