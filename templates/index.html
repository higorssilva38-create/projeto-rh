<!DOCTYPE html>
<html>
<head>
    <title>RH Inteligente</title>

    <!-- 🔥 FONTE MODERNA -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f9fafb);
            margin: 0;
        }

        /* 🔝 topo */
        .topbar {
            background: #1f2937;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }

        /* 📦 centralização */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #111827;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        .success {
            color: #16a34a;
            margin-top: 20px;
            font-weight: 500;
        }

        .dashboard-link button {
            margin-top: 10px;
            background-color: #111827;
        }

        /* 🔥 BOTÃO DO RECRUTADOR */
        .admin-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #374151;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
        }

        .admin-button:hover {
            background-color: #555;
        }

    </style>
</head>
<body>

<!-- 🔝 TOPO -->
<div class="topbar">
    💼 RH Inteligente
</div>

<!-- 🔥 BOTÃO DISCRETO DO RECRUTADOR -->
<a href="/dashboard" class="admin-button">
    ⚙️ Recrutador
</a>

<div class="wrapper">

    <div class="container">

        <h2>Envie seu currículo</h2>
        <p>Participe do processo seletivo de forma rápida e inteligente.</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="curriculo" required><br>
            <button type="submit">Enviar currículo</button>
        </form>

        {% if enviado %}
            <p class="success">✅ Currículo enviado com sucesso!</p>

            <a href="/dashboard" class="dashboard-link">
                <button>Ver análise</button>
            </a>
        {% endif %}

    </div>

</div>

</body>
</html>
